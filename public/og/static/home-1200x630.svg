<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Nodebase — AI assistants for local businesses">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16223a"/>
    </linearGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <style type="text/css"><![CDATA[
      .brand { fill: #ff6b4a; }
      .logo-circle { fill: #0f1724; stroke: #ff6b4a; stroke-width: 6px; }
      .logo-text { fill: #ffffff; font-weight: 700; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 40px; letter-spacing: 1px; }
      .headline { fill: #ffffff; font-weight: 700; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 56px; line-height: 1.02; }
      .subhead { fill: #d1d5db; font-weight: 500; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 22px; }
      .cta { fill: #0b1220; font-weight: 600; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-size: 18px; }
      .pill { fill: #ff6b4a; rx: 28; ry: 28; }
      /* responsive-like clamps are not supported in all renderers; sizes chosen for social preview legibility */
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative faint pattern (subtle) -->
  <g opacity="0.06" transform="translate(70,70)">
    <rect x="0" y="0" width="1060" height="490" rx="20" fill="#ffffff"/>
  </g>

  <!-- Left logo block -->
  <g transform="translate(100,120)" filter="url(#softShadow)">
    <rect x="0" y="0" width="180" height="180" rx="36" class="logo-circle"/>
    <text x="90" y="112" class="logo-text" text-anchor="middle" dominant-baseline="middle">NB</text>
  </g>

  <!-- Primary headline -->
  <g transform="translate(320,140)">
    <text x="0" y="0" class="headline">
      <tspan x="0" dy="0">AI assistants that run your business</tspan>
    </text>

    <text x="0" y="86" class="subhead">
      <tspan x="0" dy="0">Answers customers, schedules bookings, and collects payments — ready in minutes.</tspan>
    </text>

    <!-- CTA pill -->
    <g transform="translate(0,128)">
      <rect x="0" y="0" width="220" height="56" rx="28" fill="#ff6b4a"/>
      <text x="110" y="36" class="cta" text-anchor="middle" fill="#0b1220">Get started — free trial</text>
    </g>
  </g>

  <!-- Right-side simple illustration / visual hint -->
  <g transform="translate(850,120)">
    <!-- phone-like card -->
    <rect x="0" y="0" width="220" height="420" rx="28" fill="#071124" opacity="0.95" stroke="#1f2937" stroke-width="2"/>
    <!-- chat bubbles -->
    <g transform="translate(24,34)">
      <rect x="0" y="0" width="172" height="44" rx="12" fill="#0b1220" opacity="0.85"/>
      <rect x="0" y="72" width="140" height="36" rx="10" fill="#ff6b4a" opacity="0.95"/>
      <rect x="0" y="130" width="172" height="36" rx="10" fill="#0b1220" opacity="0.85"/>
      <rect x="0" y="188" width="140" height="36" rx="10" fill="#0b1220" opacity="0.75"/>
      <rect x="0" y="246" width="120" height="36" rx="10" fill="#0b1220" opacity="0.6"/>
    </g>
    <!-- small spark -->
    <g transform="translate(160,18)">
      <circle cx="0" cy="0" r="8" fill="#fff5f2" opacity="0.9"/>
      <circle cx="0" cy="0" r="4" fill="#ff6b4a" opacity="1"/>
    </g>
  </g>

  <!-- Footer/credit (small, unobtrusive) -->
  <g transform="translate(100,560)" opacity="0.55">
    <text x="0" y="0" fill="#ffffff" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-size="14">
      nodebase • AI assistants for local businesses
    </text>
  </g>
</svg>
