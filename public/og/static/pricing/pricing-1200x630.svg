<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Pricing — Nodebase: Simple, honest pricing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071028"/>
      <stop offset="1" stop-color="#10213a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff6b4a"/>
      <stop offset="1" stop-color="#ff8f6b"/>
    </linearGradient>
    <style><![CDATA[
      .bg { fill: url(#bg); }
      .card { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.06); }
      .logo-box { fill: #081223; stroke: url(#accent); stroke-width: 4px; rx: 20px; ry: 20px }
      .brand { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-weight:700; fill: #fff; font-size:40px; letter-spacing:0.3px }
      .headline { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-weight:800; fill:#fff; font-size:48px; line-height:1; }
      .sub { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; fill:#d1d5db; font-size:22px; }
      .pill { fill: url(#accent); rx:28; ry:28 }
      .pill-text { font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; font-weight:700; font-size:16px; fill:#071028 }
      .muted { fill:#9ca3af; font-size:14px; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" class="bg"/>

  <!-- Left panel -->
  <g transform="translate(80,60)">
    <!-- Card background for contrast -->
    <rect x="0" y="0" width="720" height="510" rx="28" class="card"/>
    <!-- Logo area -->
    <g transform="translate(28,28)">
      <rect class="logo-box" x="0" y="0" width="86" height="86" rx="18" ry="18"/>
      <text x="43" y="56" text-anchor="middle" alignment-baseline="central" class="brand">NB</text>
      <text x="110" y="54" class="brand">nodebase</text>
      <text x="110" y="84" class="muted">AI assistants for local businesses</text>
    </g>

    <!-- Headline -->
    <g transform="translate(28,140)">
      <text x="0" y="0" class="headline">Simple, honest pricing.</text>
      <text x="0" y="68" class="sub">No hidden fees. Pay only for what you use.</text>
    </g>

    <!-- Bullet highlights -->
    <g transform="translate(28,230)">
      <g transform="translate(0,0)">
        <circle cx="12" cy="12" r="10" fill="#fff" opacity="0.12"/>
        <text x="34" y="16" class="muted">Transparent per-message billing</text>
      </g>
      <g transform="translate(0,48)">
        <circle cx="12" cy="12" r="10" fill="#fff" opacity="0.12"/>
        <text x="34" y="16" class="muted">No commissions on your sales</text>
      </g>
      <g transform="translate(0,96)">
        <circle cx="12" cy="12" r="10" fill="#fff" opacity="0.12"/>
        <text x="34" y="16" class="muted">Start with a free trial — launch in minutes</text>
      </g>
    </g>

    <!-- CTA pill -->
    <g transform="translate(28,360)">
      <rect class="pill" x="0" y="0" width="220" height="56" rx="28" ry="28"/>
      <text x="110" y="36" text-anchor="middle" class="pill-text">Start free trial</text>
      <text x="240" y="38" class="muted">or talk to sales</text>
    </g>

    <!-- Small trust strip -->
    <g transform="translate(28,436)">
      <text class="muted">Trusted by small businesses — secure payments, 24/7 support</text>
    </g>
  </g>

  <!-- Right visual / pricing card representation -->
  <g transform="translate(840,110)">
    <!-- Simulated pricing card -->
    <rect x="0" y="0" width="320" height="420" rx="24" fill="#071124" opacity="0.98" stroke="#1f2937"/>
    <text x="160" y="56" text-anchor="middle" class="headline" style="font-size:26px">Starter</text>
    <text x="160" y="98" text-anchor="middle" class="brand" style="font-size:36px">Free</text>
    <g transform="translate(24,132)">
      <rect x="0" y="0" width="272" height="44" rx="12" fill="#0b1220" opacity="0.75"/>
      <text x="24" y="30" class="muted">Up to 200 messages / month</text>

      <g transform="translate(0,64)">
        <rect x="0" y="0" width="272" height="44" rx="12" fill="#0b1220" opacity="0.65"/>
        <text x="24" y="30" class="muted">Paid plans start at ₹499 / month</text>
      </g>

      <g transform="translate(0,128)">
        <rect x="0" y="0" width="272" height="44" rx="12" fill="#ff6b4a" opacity="0.95"/>
        <text x="136" y="30" text-anchor="middle" class="pill-text" style="font-size:16px">Upgrade</text>
      </g>
    </g>

    <!-- tiny badges / guarantee -->
    <g transform="translate(24,340)">
      <rect x="0" y="0" width="124" height="34" rx="10" fill="#0b1220" opacity="0.65"/>
      <text x="62" y="22" text-anchor="middle" class="muted">No lock-in</text>

      <rect x="148" y="0" width="124" height="34" rx="10" fill="#0b1220" opacity="0.65"/>
      <text x="210" y="22" text-anchor="middle" class="muted">Secure payments</text>
    </g>
  </g>

  <!-- Footer small domain line -->
  <g transform="translate(80,590)">
    <text class="muted">nodebase.space • Simple pricing for real businesses</text>
  </g>
</svg>
