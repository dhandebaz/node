services:
  # WhatsApp HTTP API
  waha:
    image: devlikeapro/waha:latest
    restart: always
    environment:
      # Print QR code in logs
      - WHATSAPP_DEFAULT_ENGINE=WEBJS
      - WAHA_PRINT_QR=True
      # If you want to use Swagger
      - WAHA_SWAGGER_ENABLED=True
      - WAHA_API_KEY=${WAHA_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./waha-sessions:/app/sessions

  # Vibecoding Execution Server
  vibecoder:
    build: ./vibecoder
    restart: always
    environment:
      - PORT=8000
      - VPS_API_KEY=${VPS_API_KEY}
    ports:
      - "8000:8000"

  # Optional: MongoDB for WAHA Plus (Session persistence)
  # mongo:
  #   image: mongo:latest
  #   restart: always
  #   volumes:
  #     - ./mongo-data:/data/db
